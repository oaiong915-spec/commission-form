<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 커미션 신청서</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .header {
            background: white;
            padding: 2rem;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 2rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-left h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .header-left p {
            font-size: 14px;
            color: #666;
        }

        .mode-buttons {
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            padding: 10px 20px;
            font-size: 13px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .mode-btn.active {
            background: #2ea043;
            color: white;
            border-color: #2ea043;
        }

        .mode-btn:hover {
            border-color: #999;
        }
        
        .characters-section {
            margin-bottom: 2rem;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .section-header h2 {
            font-size: 16px;
            font-weight: 500;
        }
        
        button {
            padding: 8px 16px;
            font-size: 13px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }
        
        button:hover {
            background: #f9f9f9;
            border-color: #999;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mode-single {
            display: none;
        }

        .mode-couple {
            display: none;
        }

        .mode-single.active {
            display: block;
        }

        .mode-couple.active {
            display: block;
        }

        /* 1인용 레이아웃 */
        
        .character-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .character-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .character-header h3 {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .close-btn {
            border: none;
            background: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 24px;
            height: 24px;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            font-size: 11px;
            color: #666;
            margin-bottom: 3px;
            font-weight: 600;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
            min-height: 50px;
        }
        
        textarea {
            resize: vertical;
            min-height: 140px;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #999;
            background: #fafafa;
        }

        .keyword-and-colors {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .keyword-box {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .keyword-box input {
            min-height: 50px !important;
            padding: 12px !important;
        }

        .colors-box {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .colors-horizontal {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .color-item-compact {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }

        .color-box-compact {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .color-label {
            font-size: 10px;
            color: #666;
            text-align: center;
            font-weight: 500;
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .main-image-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .image-box {
            border: 2px dashed #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            cursor: pointer;
            overflow: hidden;
            font-size: 48px;
            color: #ccc;
            pointer-events: auto;
            min-height: 500px;
            max-height: 700px;
            width: 100%;
        }
        
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-box-small {
            min-height: 200px;
            max-height: 300px;
            font-size: 24px;
        }

        .image-box-half {
            min-height: 150px;
            max-height: 250px;
            font-size: 24px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .other-images-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        h4 {
            font-size: 11px;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.5rem;
        }

        .characteristics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .characteristic-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .characteristic-item label {
            margin-bottom: 0;
            min-width: 60px;
        }

        .characteristic-item input {
            flex: 1;
            margin-bottom: 0;
            min-height: 70px;
            padding: 12px;
        }

        /* 커플용 레이아웃 */

        .couple-layout {
            display: grid;
            grid-template-columns: 1fr 280px 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .couple-left {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .couple-center {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .couple-right {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            transform: scaleX(-1);
        }

        .couple-right > * {
            transform: scaleX(-1);
        }

        .center-form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .center-label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
        }

        .center-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 11px;
            min-height: 38px;
        }

        .center-image-box {
            border: 2px dashed #ddd;
            border-radius: 6px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            cursor: pointer;
            overflow: hidden;
            font-size: 32px;
            color: #ccc;
        }

        .center-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .center-btn {
            padding: 6px 10px;
            font-size: 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .download-section {
            display: flex;
            gap: 8px;
            margin-top: 2rem;
        }
        
        .download-section button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            background: #2ea043;
            color: white;
            border: none;
        }
        
        .download-section button:hover {
            background: #23803a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>캐릭터 커미션 신청서</h1>
                <p>참고 이미지를 올리고 캐릭터 색감을 정의하세요</p>
            </div>
            <div class="mode-buttons">
                <button class="mode-btn active" onclick="switchMode('single')">1인용</button>
                <button class="mode-btn" onclick="switchMode('couple')">커플(2인용)</button>
            </div>
        </div>

        <!-- 1인용 모드 -->
        <div class="mode-single active">
            <div class="characters-section">
                <div class="section-header">
                    <h2>캐릭터</h2>
                    <button id="addCharBtn">+ 캐릭터 추가</button>
                </div>
                <div id="charactersContainer"></div>
            </div>
            
            <div class="download-section">
                <button id="downloadImageBtn">📥 이미지로 저장</button>
            </div>
        </div>

        <!-- 커플용 모드 -->
        <div class="mode-couple">
            <div class="characters-section">
                <div class="section-header">
                    <h2>커플 커미션</h2>
                    <button id="addCoupleBtn">+ 커플 추가</button>
                </div>
                <div id="couplePairsContainer"></div>
            </div>
            
            <div class="download-section">
                <button id="downloadCoupleImageBtn">📥 이미지로 저장</button>
            </div>
        </div>
    </div>

    <script>
        let characters = [];
        let couplePairs = [];
        
        const addCharBtn = document.getElementById('addCharBtn');
        const charactersContainer = document.getElementById('charactersContainer');
        const downloadImageBtn = document.getElementById('downloadImageBtn');
        const addCoupleBtn = document.getElementById('addCoupleBtn');
        const couplePairsContainer = document.getElementById('couplePairsContainer');
        const downloadCoupleImageBtn = document.getElementById('downloadCoupleImageBtn');

        function switchMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.mode-single, .mode-couple').forEach(el => el.classList.remove('active'));
            
            if (mode === 'single') {
                document.querySelector('.mode-single').classList.add('active');
            } else {
                document.querySelector('.mode-couple').classList.add('active');
                if (couplePairs.length === 0) {
                    addCouplePair();
                }
            }
        }

        // ===== 1인용 함수들 =====
        
        function addCharacter() {
            const charId = 'char_' + Date.now();
            characters.push({
                id: charId,
                keyword: '',
                characteristics: ['', '', '', '', ''],
                images: {
                    animal: null,
                    main: null,
                    small1: null,
                    small2: null,
                    other1: null,
                    other2: null
                },
                additionalInfo: ['', ''],
                colors: {
                    hair: { code: '#000000', name: '머리색' },
                    eyeL: { code: '#8B6914', name: '눈색 (왼)' },
                    eyeR: { code: '#8B6914', name: '눈색 (오른)' },
                    skin: { code: '#F5DEB3', name: '피부색' },
                    etc1: { code: '#808080', name: '기타1' },
                    etc2: { code: '#808080', name: '기타2' }
                }
            });
            renderCharacters();
        }
        
        function renderCharacters() {
            charactersContainer.innerHTML = characters.map((char, idx) => `
                <div class="character-card" id="char-${char.id}">
                    <div class="character-header">
                        <h3>캐릭터 ${idx + 1}</h3>
                        <button class="close-btn" data-char-id="${char.id}">×</button>
                    </div>
                    
                    <div class="keyword-and-colors">
                        <div class="keyword-box">
                            <label>캐릭터 키워드</label>
                            <input type="text" value="${char.keyword}" onchange="updateCharKeyword('${char.id}', this.value)" placeholder="캐릭터를 나타낼 키워드를 입력하세요">
                        </div>

                        <div class="colors-box">
                            <label style="margin-bottom: 1rem; font-size: 11px; display: block;">색상</label>
                            <div class="colors-horizontal">
                                ${['hair', 'eyeL', 'eyeR', 'skin', 'etc1', 'etc2'].map((key, idx) => {
                                    const color = char.colors[key];
                                    const labels = ['머리', '눈(좌)', '눈(우)', '피부', '기타1', '기타2'];
                                    return `
                                        <div class="color-item-compact">
                                            <div class="color-box-compact" data-select-color data-char-id="${char.id}" data-color-key="${key}" style="background: ${color.code};"></div>
                                            <div class="color-label">${labels[idx]}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="content-grid">
                        <div class="main-image-section">
                            <h4>메인 이미지</h4>
                            <div class="image-box" id="main-image-${char.id}">
                                ${char.images.main ? `<img src="${char.images.main}" style="object-fit: cover; object-position: ${char.imagePosition ? char.imagePosition.x + '% ' + char.imagePosition.y + '%' : '50% 50%'}">` : '+'}
                            </div>
                            <button style="width: 100%; font-size: 11px;" data-select-image data-char-id="${char.id}" data-image-type="main">이미지 선택</button>
                            <button style="width: 100%; font-size: 10px; margin-top: 4px; background: #f0f0f0;" id="adjust-btn-${char.id}" style="display: none;" onclick="startImageAdjust('${char.id}')">이미지 조정</button>
                            
                            <h4 style="margin-top: 0.75rem;">기타 이미지</h4>
                            <div class="other-images-section">
                                <div>
                                    <div class="image-box image-box-half" id="other1-image-${char.id}">
                                        ${char.images.other1 ? `<img src="${char.images.other1}" style="object-fit: cover; object-position: ${char.other1Position ? char.other1Position.x + '% ' + char.other1Position.y + '%' : '50% 50%'}">` : '+'}
                                    </div>
                                    <button style="width: 100%; font-size: 10px; margin-top: 4px;" data-select-image data-char-id="${char.id}" data-image-type="other1">선택</button>
                                    <button style="width: 100%; font-size: 9px; margin-top: 2px; background: #f0f0f0;" data-adjust-image="${char.id}-other1" onclick="startImageAdjustOther('${char.id}', 'other1')">조정</button>
                                </div>
                                <div>
                                    <div class="image-box image-box-half" id="other2-image-${char.id}">
                                        ${char.images.other2 ? `<img src="${char.images.other2}" style="object-fit: cover; object-position: ${char.other2Position ? char.other2Position.x + '% ' + char.other2Position.y + '%' : '50% 50%'}">` : '+'}
                                    </div>
                                    <button style="width: 100%; font-size: 10px; margin-top: 4px;" data-select-image data-char-id="${char.id}" data-image-type="other2">선택</button>
                                    <button style="width: 100%; font-size: 9px; margin-top: 2px; background: #f0f0f0;" data-adjust-image="${char.id}-other2" onclick="startImageAdjustOther('${char.id}', 'other2')">조정</button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid-2">
                            <div>
                                <h4>동물화</h4>
                                <div class="image-box image-box-small" onclick="selectImage('${char.id}', 'animal')">
                                    ${char.images.animal ? `<img src="${char.images.animal}">` : '+'}
                                </div>
                                <button style="width: 100%; font-size: 10px;" onclick="selectImage('${char.id}', 'animal')">선택</button>
                            </div>
                            
                            <div>
                                <h4>기타1</h4>
                                <div class="image-box image-box-small" onclick="selectImage('${char.id}', 'small1')">
                                    ${char.images.small1 ? `<img src="${char.images.small1}">` : '+'}
                                </div>
                                <button style="width: 100%; font-size: 10px;" onclick="selectImage('${char.id}', 'small1')">선택</button>
                            </div>
                            
                            <div>
                                <h4>기타2</h4>
                                <div class="image-box image-box-small" onclick="selectImage('${char.id}', 'small2')">
                                    ${char.images.small2 ? `<img src="${char.images.small2}">` : '+'}
                                </div>
                                <button style="width: 100%; font-size: 10px;" onclick="selectImage('${char.id}', 'small2')">선택</button>
                            </div>
                            
                            <div style="grid-column: 1/3;">
                                <h4>특징</h4>
                                <div class="characteristics-grid">
                                    ${char.characteristics.map((val, i) => `
                                        <div class="characteristic-item">
                                            <label>특징 ${i + 1}</label>
                                            <input type="text" value="${val}" onchange="updateCharacteristic('${char.id}', ${i}, this.value)" placeholder="예: 쾌활함">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <div style="grid-column: 1/3;">
                                <h4>추가정보</h4>
                                ${char.additionalInfo.map((val, i) => `
                                    <div style="margin-bottom: 0.75rem;">
                                        <label>추가정보 ${i + 1}</label>
                                        <textarea onchange="updateAdditionalInfo('${char.id}', ${i}, this.value)" placeholder="추가 정보를 입력하세요">${val}</textarea>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 클로즈 버튼 이벤트 추가
            document.querySelectorAll('.close-btn[data-char-id]').forEach(btn => {
                btn.addEventListener('click', () => {
                    removeCharacter(btn.dataset.charId);
                });
            });

            // 이미지 선택 버튼 이벤트 추가
            document.querySelectorAll('[data-select-image]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const charId = e.target.dataset.charId;
                    const imageType = e.target.dataset.imageType;
                    selectImage(charId, imageType);
                });
            });

            // 색상 선택 버튼 이벤트 추가
            document.querySelectorAll('[data-select-color]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const charId = e.target.dataset.charId;
                    const colorKey = e.target.dataset.colorKey;
                    selectColorField(charId, colorKey);
                });
            });
        }
        
        function updateCharKeyword(charId, value) {
            const char = characters.find(c => c.id === charId);
            if (char) char.keyword = value;
        }
        
        function updateCharacteristic(charId, idx, value) {
            const char = characters.find(c => c.id === charId);
            if (char) char.characteristics[idx] = value;
        }
        
        function updateAdditionalInfo(charId, idx, value) {
            const char = characters.find(c => c.id === charId);
            if (char) char.additionalInfo[idx] = value;
        }
        
        function updateColorName(charId, colorKey, value) {
            const char = characters.find(c => c.id === charId);
            if (char && char.colors[colorKey]) {
                char.colors[colorKey].name = value;
            }
        }
        
        function removeCharacter(charId) {
            characters = characters.filter(c => c.id !== charId);
            renderCharacters();
        }

        // ===== 커플용 함수들 =====

        function addCouplePair() {
            const pairId = 'couple_' + Date.now();
            couplePairs.push({
                id: pairId,
                centerMusic: '',
                centerImage: null,
                centerKeyword: '',
                char1: createEmptyCharacter(),
                char2: createEmptyCharacter()
            });
            renderCouplePairs();
        }

        function createEmptyCharacter() {
            return {
                keyword: '',
                characteristics: ['', '', '', '', ''],
                images: {
                    animal: null,
                    main: null,
                    small1: null,
                    small2: null,
                    other1: null,
                    other2: null
                },
                additionalInfo: ['', ''],
                colors: {
                    hair: { code: '#000000', name: '머리색' },
                    eyeL: { code: '#8B6914', name: '눈색 (왼)' },
                    eyeR: { code: '#8B6914', name: '눈색 (오른)' },
                    skin: { code: '#F5DEB3', name: '피부색' },
                    etc1: { code: '#808080', name: '기타1' },
                    etc2: { code: '#808080', name: '기타2' }
                }
            };
        }

        function renderCouplePairs() {
            couplePairsContainer.innerHTML = couplePairs.map((pair, idx) => {
                const renderCoupleChar = (charNum, charData, pairId) => `
                    <div class="keyword-and-colors">
                        <div class="keyword-box">
                            <label>키워드</label>
                            <input type="text" value="${charData.keyword}" onchange="updateCoupleCharKeyword('${pairId}', ${charNum}, this.value)" placeholder="키워드">
                        </div>

                        <div class="colors-box">
                            <label style="margin-bottom: 1rem; font-size: 11px; display: block;">색상</label>
                            <div class="colors-horizontal">
                                ${['hair', 'eyeL', 'eyeR', 'skin', 'etc1', 'etc2'].map((key, idx) => {
                                    const color = charData.colors[key];
                                    const labels = ['머리', '눈(좌)', '눈(우)', '피부', '기타1', '기타2'];
                                    return `

                left: 0;
                pointer-events: none;
                z-index: 10;
            `;

            container.appendChild(adjustImg);
            container.appendChild(crosshair);
            container.appendChild(crosshairH);

            let scale = 1;
            let offsetX = 0;
            let offsetY = 0;
            let isDragging = false;
            let startX, startY;

            const updateImage = () => {
                adjustImg.style.width = (adjustImg.naturalWidth * scale) + 'px';
                adjustImg.style.height = (adjustImg.naturalHeight * scale) + 'px';
                adjustImg.style.left = offsetX + 'px';
                adjustImg.style.top = offsetY + 'px';
            };

            adjustImg.onload = () => {
                const imgWidth = adjustImg.naturalWidth;
                const imgHeight = adjustImg.naturalHeight;
                const ratio = Math.max(500 / imgWidth, 350 / imgHeight);
                scale = ratio * 1.2;
                offsetX = (500 - imgWidth * scale) / 2;
                offsetY = (350 - imgHeight * scale) / 2;
                updateImage();
            };

            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX - offsetX;
                startY = e.clientY - offsetY;
                container.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    offsetX = e.clientX - startX;
                    offsetY = e.clientY - startY;
                    updateImage();
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                container.style.cursor = 'grab';
            });

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const scaleChange = e.deltaY > 0 ? 0.9 : 1.1;
                const oldScale = scale;
                scale *= scaleChange;
                scale = Math.max(1, Math.min(scale, 5));

                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                offsetX = mouseX - (mouseX - offsetX) * (scale / oldScale);
                offsetY = mouseY - (mouseY - offsetY) * (scale / oldScale);

                updateImage();
            });

            const buttonContainer = document.createElement('div');
            buttonContainer.style.cssText = `

                font-weight: 500;

                const posKey = imageType + 'Position';

                    x: Math.max(0, Math.min(100, centerX)),

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = '✕ 취소';
            cancelBtn.style.cssText = `
                padding: 12px 30px;
                background: #666;
                color: white;

                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
            `;
            cancelBtn.onclick = () => {
                document.body.removeChild(overlay);
            };

            buttonContainer.appendChild(confirmBtn);
            buttonContainer.appendChild(cancelBtn);

            overlay.appendChild(topBar);
            overlay.appendChild(container);
            overlay.appendChild(buttonContainer);
            document.body.appendChild(overlay);
        }

                scale = ratio * 1.2;
                offsetX = (500 - imgWidth * scale) / 2;
                offsetY = (500 - imgHeight * scale) / 2;
                updateImage();
            };

            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX - offsetX;
                startY = e.clientY - offsetY;
                container.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    offsetX = e.clientX - startX;
                    offsetY = e.clientY - startY;
                    updateImage();
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                container.style.cursor = 'grab';
            });

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const scaleChange = e.deltaY > 0 ? 0.9 : 1.1;
                const oldScale = scale;
                scale *= scaleChange;
                scale = Math.max(1, Math.min(scale, 5));

                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                offsetX = mouseX - (mouseX - offsetX) * (scale / oldScale);
                offsetY = mouseY - (mouseY - offsetY) * (scale / oldScale);

                updateImage();
            });

            const buttonContainer = document.createElement('div');
            buttonContainer.style.cssText = `
                margin-top: 20px;
                display: flex;
                gap: 10px;
            `;

            const confirmBtn = document.createElement('button');
            confirmBtn.textContent = '✓ 완료';
            confirmBtn.style.cssText = `
                padding: 12px 30px;
                background: #2ea043;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
            `;
            confirmBtn.onclick = () => {
                // 이미지 박스 내에서의 중앙 위치 계산
                const boxWidth = 500;
                const boxHeight = 500;
                const centerX = (boxWidth / 2 - offsetX) / (adjustImg.naturalWidth * scale) * 100;
                const centerY = (boxHeight / 2 - offsetY) / (adjustImg.naturalHeight * scale) * 100;
                
                // 이미지 데이터 저장
                char.imagePosition = {
                    x: Math.max(0, Math.min(100, centerX)),
                    y: Math.max(0, Math.min(100, centerY))
                };
                
                // 렌더링하면서 자동으로 적용됨
                renderCouplePairs();
                document.body.removeChild(overlay);
            };

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = '✕ 취소';
            cancelBtn.style.cssText = `
                padding: 12px 30px;
                background: #666;
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
            `;
            cancelBtn.onclick = () => {
                document.body.removeChild(overlay);
            };

            buttonContainer.appendChild(confirmBtn);
            buttonContainer.appendChild(cancelBtn);

            overlay.appendChild(topBar);
            overlay.appendChild(container);
            overlay.appendChild(buttonContainer);
            document.body.appendChild(overlay);
        }

        function selectCoupleImage(pairId, charNum, imageType) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const pair = couplePairs.find(p => p.id === pairId);
                        if (pair) {
                            const char = charNum === 1 ? pair.char1 : pair.char2;
                            char.images[imageType] = event.target.result;
                            renderCouplePairs();
                            // 메인 이미지 선택 후 조정 버튼 표시
                            if (imageType === 'main') {
                                setTimeout(() => {
                                    const btn = document.getElementById(`adjust-couple-${pairId}-${charNum}`);
                                    if (btn) btn.style.display = 'block';
                                }, 100);
                            }
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function selectCoupleCenterImage(pairId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const pair = couplePairs.find(p => p.id === pairId);
                        if (pair) {
                            pair.centerImage = event.target.result;
                            renderCouplePairs();
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function selectColorField(charId, colorKey) {
            let colorPickerImage = null;
            for (let char of characters) {
                if (char.images.animal) {
                    colorPickerImage = char.images.animal;
                    break;
                }
                if (char.images.main) {
                    colorPickerImage = char.images.main;
                    break;
                }
                if (char.images.small1) {
                    colorPickerImage = char.images.small1;
                    break;
                }
                if (char.images.small2) {
                    colorPickerImage = char.images.small2;
                    break;
                }
                if (char.images.other1) {
                    colorPickerImage = char.images.other1;
                    break;
                }
                if (char.images.other2) {
                    colorPickerImage = char.images.other2;
                    break;
                }
            }
            
            if (!colorPickerImage) {
                alert('먼저 이미지를 업로드하세요');
                return;
            }
            
            showColorPicker(charId, colorKey, colorPickerImage, false);
        }

        function selectCoupleColorField(pairId, charNum, colorKey) {
            const pair = couplePairs.find(p => p.id === pairId);
            if (!pair) return;
            
            const char = charNum === 1 ? pair.char1 : pair.char2;
            let colorPickerImage = null;
            
            for (const imgKey in char.images) {
                if (char.images[imgKey]) {
                    colorPickerImage = char.images[imgKey];
                    break;
                }
            }
            
            if (!colorPickerImage) {
                alert('먼저 이미지를 업로드하세요');
                return;
            }
            
            showColorPickerCouple(pairId, charNum, colorKey, colorPickerImage);
        }

        function showColorPicker(charId, colorKey, colorPickerImage, isCouple) {
            const canvas = document.createElement('canvas');
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: crosshair;';
                
                const container = document.createElement('div');
                container.style.cssText = 'position: relative; max-width: 80%; max-height: 80%;';
                
                const imgElement = document.createElement('img');
                imgElement.src = colorPickerImage;
                imgElement.style.cssText = 'max-width: 100%; max-height: 100%; display: block;';
                
                container.appendChild(imgElement);
                overlay.appendChild(container);
                document.body.appendChild(overlay);
                
                imgElement.addEventListener('click', (e) => {
                    const rect = imgElement.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
                    const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
                    
                    const imageData = ctx.getImageData(x, y, 1, 1);
                    const [r, g, b] = imageData.data;
                    const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
                    
                    const char = characters.find(c => c.id === charId);
                    if (char) char.colors[colorKey].code = hex;
                    
                    document.body.removeChild(overlay);
                    renderCharacters();
                });
                
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        document.body.removeChild(overlay);
                    }
                });
            };
            img.src = colorPickerImage;
        }

        function showColorPickerCouple(pairId, charNum, colorKey, colorPickerImage) {
            const canvas = document.createElement('canvas');
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const overlay = document.createElement('div');

                const container = document.createElement('div');
                container.style.cssText = 'position: relative; max-width: 80%; max-height: 80%;';
                
                const imgElement = document.createElement('img');
                imgElement.src = colorPickerImage;
                imgElement.style.cssText = 'max-width: 100%; max-height: 100%; display: block;';
                
                container.appendChild(imgElement);
                overlay.appendChild(container);
                document.body.appendChild(overlay);
                
                imgElement.addEventListener('click', (e) => {
                    const rect = imgElement.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
                    const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
                    
                    const imageData = ctx.getImageData(x, y, 1, 1);
                    const [r, g, b] = imageData.data;
                    const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
                    
                    const pair = couplePairs.find(p => p.id === pairId);
                    if (pair) {
                        const char = charNum === 1 ? pair.char1 : pair.char2;
                        char.colors[colorKey].code = hex;
                    }
                    
                    document.body.removeChild(overlay);
                    renderCouplePairs();
                });
                
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        document.body.removeChild(overlay);
                    }
                });
            };
            img.src = colorPickerImage;
        }

        downloadImageBtn.addEventListener('click', async () => {
            if (characters.length === 0) {
                alert('최소 1개 이상의 캐릭터를 추가하세요');
                return;
            }
            
            downloadImageBtn.disabled = true;
            downloadImageBtn.textContent = '저장 중...';
            
            try {
                for (let idx = 0; idx < characters.length; idx++) {
                    const char = characters[idx];
                    const element = document.getElementById(`char-${char.id}`);
                    
                    const canvas = await html2canvas(element, {
                        backgroundColor: '#ffffff',
                        scale: 2,
                        useCORS: true,
                        allowTaint: true,
                        logging: false
                    });
                    
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = (char.keyword || '캐릭터_' + (idx + 1)) + '.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            } catch (e) {
                console.error('저장 오류:', e);
                alert('저장 중 오류가 발생했습니다.');
            } finally {
                downloadImageBtn.disabled = false;
                downloadImageBtn.textContent = '📥 이미지로 저장';
            }
        });

                    const canvas = await html2canvas(element, {

                        allowTaint: true,

                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = (pair.centerKeyword || '커플_' + (idx + 1)) + '.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            } catch (e) {
                console.error('저장 오류:', e);
                alert('저장 중 오류가 발생했습니다.');
            } finally {
                downloadCoupleImageBtn.disabled = false;
                downloadCoupleImageBtn.textContent = '📥 이미지로 저장';
            }
        });
        
        addCharBtn.addEventListener('click', addCharacter);
        addCoupleBtn.addEventListener('click', addCouplePair);
        
        addCharacter();
